name: Deploy (mom-bot)

# A++ dev/prod model: this workflow always deploys to prod.
# Local dev uses the developer's laptop + az login + dev-* secrets in KV.
# No target: dev|prod input — there is only one deployment target.
#
# PREREQUISITE: complete infra/aad-runbook.md before this workflow can succeed.
# Repo variables required:
#   AZURE_CLIENT_ID        — app registration client ID (mom-bot-gha)
#   AZURE_TENANT_ID        — 48bca6c3-6d4f-4884-bc1a-648ae2362a32
#   AZURE_SUBSCRIPTION_ID  — 213aa1f8-32d1-4ffe-8f4d-6e60f1cd9dc0
#

on:
  workflow_dispatch:
    inputs:
      commit_sha:
        description: "Commit SHA of the image to deploy. Defaults to HEAD of `main`. Must match a SHA that has a built GHCR image."
        type: string
        required: false
        default: ""

jobs:
  deploy:
    name: Deploy to prod
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # required for OIDC federated login to Azure
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Azure login (OIDC — no client secret)
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5  # v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Verify required KV secrets are present
        # Fails fast if any secret has not been set before deploying the image.
        # This guards against deploying a bot that will crash at startup because
        # a required secret is missing.  Add new secret names here whenever a
        # new load_secret() call is introduced in the codebase.
        run: |
          VAULT="kv-mombot-eastus2"
          REQUIRED_SECRETS=(
            "prod-discord-token"
            "prod-guild-id"
            "prod-reminder-channel-name"
            "prod-reminder-mention-role-name"
            "prod-siege-web-url"
            "prod-siege-web-bot-token"
          )
          MISSING=()
          for secret in "${REQUIRED_SECRETS[@]}"; do
            if ! az keyvault secret show --vault-name "$VAULT" --name "$secret" \
                  --query "id" -o tsv >/dev/null 2>&1; then
              MISSING+=("$secret")
            fi
          done
          if [ ${#MISSING[@]} -gt 0 ]; then
            echo "::error::Missing required KV secrets: ${MISSING[*]}"
            echo "Set them with: az keyvault secret set --vault-name $VAULT --name <name> --value <value>"
            exit 1
          fi
          echo "All required KV secrets present."

      - name: Resolve image SHA
        id: resolve_sha
        run: |
          SHA="${{ inputs.commit_sha }}"
          if [ -z "$SHA" ]; then
            SHA="${{ github.sha }}"
          fi
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "Resolved image SHA: $SHA"

      - name: Verify image exists in GHCR
        run: |
          SHA="${{ steps.resolve_sha.outputs.sha }}"
          if ! docker manifest inspect "ghcr.io/glitchwerks/mom-bot:$SHA" >/dev/null 2>&1; then
            echo "::error::Image ghcr.io/glitchwerks/mom-bot:$SHA does not exist in GHCR. Has build-image.yml run for this SHA on a green-CI main commit?"
            exit 1
          fi
          echo "Image exists: ghcr.io/glitchwerks/mom-bot:$SHA"

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0

      - name: Install Python deps from uv.lock
        run: uv sync --frozen --no-dev
        # uv.lock is materialized in the image per § 9 dep-pinning Option A;
        # the deploy workflow also uses it for the migration step.
        # This installs alembic, sqlalchemy, psycopg[binary] from the locked
        # versions — same as what the container image runs.

      - name: Resolve Postgres FQDN
        id: pg
        run: |
          FQDN=$(az postgres flexible-server list \
            --resource-group mom-bot \
            --query "[?starts_with(name,'pg-mombot-')].fullyQualifiedDomainName | [0]" \
            -o tsv)
          if [ -z "$FQDN" ]; then
            echo "::error::No pg-mombot-* server found in resource group mom-bot."
            exit 1
          fi
          echo "fqdn=$FQDN" >> "$GITHUB_OUTPUT"

      - name: Add transient firewall rule for runner IP
        id: fw
        run: |
          RUNNER_IP=$(curl -sf https://api.ipify.org)
          RULE_NAME="gha-runner-$(date +%s)"
          SERVER=$(echo "${{ steps.pg.outputs.fqdn }}" | cut -d. -f1)
          az postgres flexible-server firewall-rule create \
            --resource-group mom-bot \
            --name "$SERVER" \
            --rule-name "$RULE_NAME" \
            --start-ip-address "$RUNNER_IP" \
            --end-ip-address "$RUNNER_IP"
          echo "rule_name=$RULE_NAME" >> "$GITHUB_OUTPUT"
          echo "server=$SERVER" >> "$GITHUB_OUTPUT"

      - name: Wait for AAD admin propagation
        run: sleep 60
        # Spike #101 observed <60 s end-to-end latency for Entra admin
        # assignment to propagate. Hedge: sleep 60 s before first migration
        # attempt. Source: docs/spike/2026-05-17-postgres-aad-findings.md
        # § Bonus Finding 5.

      - name: Run alembic upgrade head
        env:
          # AAD token injected via PGPASSWORD; psycopg3 reads it from env.
          # Token TTL: ~86 min observed (spike #101 § Charge 3). The deploy
          # job runs end-to-end in well under 86 min so no refresh is needed.
          MOM_BOT_DATABASE_URL: >-
            postgresql+psycopg://mom-bot-gha@${{ steps.pg.outputs.fqdn }}:5432/mom_bot?sslmode=require
        run: |
          PGPASSWORD=$(az account get-access-token \
            --resource https://ossrdbms-aad.database.windows.net \
            --query accessToken -o tsv)
          export PGPASSWORD
          uv run alembic upgrade head

      - name: Remove transient firewall rule
        if: always() && steps.fw.outputs.rule_name != ''
        run: |
          az postgres flexible-server firewall-rule delete \
            --resource-group mom-bot \
            --name "${{ steps.fw.outputs.server }}" \
            --rule-name "${{ steps.fw.outputs.rule_name }}" \
            --yes

      - name: Deploy container image to prod
        run: |
          az containerapp update \
            --name ca-mom-bot \
            --resource-group mom-bot \
            --image ghcr.io/glitchwerks/mom-bot:${{ steps.resolve_sha.outputs.sha }}
